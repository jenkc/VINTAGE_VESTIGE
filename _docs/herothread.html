<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Thread — Preview (with thumbnails)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=JetBrains+Mono&family=Archivo:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0A0A0A; --dark:#1A1A1A; --grey-400:#9B9B9B;
    --grey-100:#F0F0F0; --grey-200:#E0E0E0; --off-white:#F5F5F0; --accent:#C4553A;
  }
  *{margin:0;box-sizing:border-box}
  body{background:#fff;color:var(--black);font-family:'Archivo',sans-serif}

  /* ── Hero layout (mirrors page.tsx) ── */
  .hero{
    position:relative; min-height:85vh; display:flex; flex-direction:column;
    justify-content:flex-end; overflow:hidden; padding:0 48px 80px;
  }
  .hero-copy{position:relative; max-width:720px}
  h1{font-size:clamp(56px,10vw,120px); font-weight:900; text-transform:uppercase;
     line-height:.9; letter-spacing:-.02em}
  .tagline{margin-top:32px; max-width:480px; font-family:'Cormorant Garamond',serif;
     font-style:italic; font-size:26px; line-height:1.4; color:var(--dark)}
  .stat{margin-top:24px; font-family:'JetBrains Mono',monospace; font-size:11px;
     text-transform:uppercase; letter-spacing:.1em; color:var(--grey-400)}
  .cta{display:inline-block; margin-top:40px; background:var(--black); color:#fff;
     padding:14px 32px; font-family:'JetBrains Mono',monospace; font-size:11px;
     text-transform:uppercase; letter-spacing:.2em; text-decoration:none}

  /* ── HeroThread placement (mirrors the absolute wrapper in page.tsx) ── */
  .hero-thread-wrap{
    pointer-events:none; position:absolute; right:9%; top:8%;
    height:70%; width:240px; opacity:.8;
  }
  @media (max-width:768px){ .hero-thread-wrap{ display:none } }

  /* ── Animation CSS (verbatim from globals.css) ── */
  .hero-thread-stage{ position:relative; width:100%; height:100% }
  .hero-thread{ width:100%; height:100% }

  .hero-thread-line{
    stroke-dasharray:900; stroke-dashoffset:900;
    animation:hero-thread-draw 8s ease-in-out infinite;
  }
  @keyframes hero-thread-draw{
    0%{stroke-dashoffset:900} 55%{stroke-dashoffset:0}
    85%{stroke-dashoffset:0} 100%{stroke-dashoffset:900}
  }
  .hero-thread-node{
    opacity:0; transform-box:fill-box; transform-origin:center;
    animation:hero-thread-node 8s ease-in-out infinite;
    animation-delay:calc(var(--i) * .9s);
  }
  @keyframes hero-thread-node{
    0%,8%{opacity:0; transform:scale(.4)}
    18%{opacity:1; transform:scale(1)}
    80%{opacity:1; transform:scale(1)}
    92%,100%{opacity:0; transform:scale(.4)}
  }

  .hero-thumb{
    position:absolute; width:44px; height:56px; object-fit:cover;
    border-radius:3px; border:1px solid var(--grey-200); background:var(--off-white);
    transform:translateY(-50%) scale(.4); opacity:0;
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    animation:hero-thumb 8s ease-in-out infinite;
    animation-delay:calc(var(--i) * .9s);
  }
  @keyframes hero-thumb{
    0%,8%{opacity:0; transform:translateY(-50%) scale(.4)}
    18%{opacity:1; transform:translateY(-50%) scale(1)}
    80%{opacity:1; transform:translateY(-50%) scale(1)}
    92%,100%{opacity:0; transform:translateY(-50%) scale(.4)}
  }

  @media (prefers-reduced-motion:reduce){
    .hero-thread-line{animation:none; stroke-dashoffset:0}
    .hero-thread-node{animation:none; opacity:1; transform:none}
    .hero-thumb{animation:none; opacity:1; transform:translateY(-50%) scale(1)}
  }
</style>
</head>
<body>
  <section class="hero">
    <div class="hero-thread-wrap" aria-hidden="true">
      <div class="hero-thread-stage">
        <svg class="hero-thread" viewBox="0 0 200 620" fill="none" preserveAspectRatio="xMidYMid meet">
          <path d="M 100 40 C 100 110, 118 130, 118 190 C 118 250, 86 250, 86 310 C 86 370, 112 370, 112 430 C 112 490, 92 490, 92 545 L 92 580"
                stroke="var(--grey-100)" stroke-width="1.5"/>
          <path class="hero-thread-line"
                d="M 100 40 C 100 110, 118 130, 118 190 C 118 250, 86 250, 86 310 C 86 370, 112 370, 112 430 C 112 490, 92 490, 92 545 L 92 580"
                stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
          <g class="hero-thread-node" style="--i:0"><circle cx="100" cy="70"  r="9" fill="var(--off-white)" stroke="var(--accent)" stroke-width="1"/><circle cx="100" cy="70"  r="3" fill="var(--accent)"/></g>
          <g class="hero-thread-node" style="--i:1"><circle cx="118" cy="190" r="9" fill="var(--off-white)" stroke="var(--accent)" stroke-width="1"/><circle cx="118" cy="190" r="3" fill="var(--accent)"/></g>
          <g class="hero-thread-node" style="--i:2"><circle cx="86"  cy="310" r="9" fill="var(--off-white)" stroke="var(--accent)" stroke-width="1"/><circle cx="86"  cy="310" r="3" fill="var(--accent)"/></g>
          <g class="hero-thread-node" style="--i:3"><circle cx="112" cy="430" r="9" fill="var(--off-white)" stroke="var(--accent)" stroke-width="1"/><circle cx="112" cy="430" r="3" fill="var(--accent)"/></g>
          <g class="hero-thread-node" style="--i:4"><circle cx="92"  cy="545" r="9" fill="var(--off-white)" stroke="var(--accent)" stroke-width="1"/><circle cx="92"  cy="545" r="3" fill="var(--accent)"/></g>
        </svg>

        <!-- real garment thumbnails, alternating sides, top% = cy/620 -->
        <img class="hero-thumb" style="--i:0; top:11.3%; left:calc(50% + 16px)"  src="https://tusswxlrdoamintvswjs.supabase.co/storage/v1/object/public/product-images/2336.jpg" alt="">
        <img class="hero-thumb" style="--i:1; top:30.6%; right:calc(50% + 16px)" src="https://tusswxlrdoamintvswjs.supabase.co/storage/v1/object/public/product-images/3336.jpg" alt="">
        <img class="hero-thumb" style="--i:2; top:50.0%; left:calc(50% + 16px)"  src="https://tusswxlrdoamintvswjs.supabase.co/storage/v1/object/public/product-images/2220.jpg" alt="">
        <img class="hero-thumb" style="--i:3; top:69.4%; right:calc(50% + 16px)" src="https://tusswxlrdoamintvswjs.supabase.co/storage/v1/object/public/product-images/303.jpg" alt="">
        <img class="hero-thumb" style="--i:4; top:87.9%; left:calc(50% + 16px)"  src="https://tusswxlrdoamintvswjs.supabase.co/storage/v1/object/public/product-images/2659.jpg" alt="">
      </div>
    </div>

    <div class="hero-copy">
      <h1>Vintage<br>Vestige</h1>
      <p class="tagline">Start from a question,<br>not a timeline.</p>
      <p class="stat">3,700+ garments · 21,000+ connections · 500 years</p>
      <a class="cta" href="#">Explore Connections</a>
    </div>
  </section>
</body>
</html>
